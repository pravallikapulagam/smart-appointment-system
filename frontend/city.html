<!DOCTYPE html>
<html>
<head>
  <title>Select Hospital</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f4f6f9;
    }
    .navbar {
      background-color: #1e3a8a;
    }
    .navbar-brand {
      color: white !important;
      font-weight: 600;
    }
    .card {
      border-radius: 12px;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg px-4">
  <span class="navbar-brand">🏥 Smart Clinic</span>
  <div class="ms-auto">
    <button class="btn btn-light btn-sm" onclick="goBack()">Back</button>
  </div>
</nav>

<div class="container mt-4">

  <h3 id="cityTitle" class="mb-4"></h3>

  <div class="row" id="hospitalList"></div>

</div>

<script>
const token = localStorage.getItem("token");
const city = localStorage.getItem("city");

if (!token || !city) {
  window.location.href = "login.html";
}

document.getElementById("cityTitle").innerText = city + " Hospitals";

function goBack() {
  window.location.href = "location.html";
}

// Fetch hospitals for selected city
fetch(`http://localhost:3000/hospitals/${city}`, {
  headers: {
    "Authorization": "Bearer " + token
  }
})
.then(res => res.json())
.then(data => {

  const container = document.getElementById("hospitalList");
  container.innerHTML = "";

  if (data.length === 0) {
    container.innerHTML = "<p>No hospitals available in this city.</p>";
    return;
  }

  data.forEach(hospital => {

    const col = document.createElement("div");
    col.className = "col-md-4 mb-4";

    col.innerHTML = `
      <div class="card shadow-sm h-100">
        <img src="http://localhost:3000${hospital.image}" 
             class="card-img-top"
             style="height:200px; object-fit:cover;"
             alt="Hospital Image">

        <div class="card-body d-flex flex-column">
          <h5 class="card-title">${hospital.name}</h5>
          <p class="card-text">${hospital.description}</p>

          <button onclick="viewHospital(${hospital.id})"
                  class="btn btn-primary mt-auto">
            View Hospital
          </button>
        </div>
      </div>
    `;

    container.appendChild(col);
  });

})
.catch(error => {
  console.error("Error loading hospitals:", error);
});

// Store hospital ID and go to details page
function viewHospital(id) {
  localStorage.setItem("hospitalId", id);
  window.location.href = "hospital-details.html";
}
</script>

</body>
</html>
