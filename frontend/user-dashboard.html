<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary px-4">
  <span class="navbar-brand">Smart Clinic</span>
  <button onclick="logout()" class="btn btn-light btn-sm">Logout</button>
</nav>

<div class="container mt-4">

  <h4>Book Appointment</h4>

  <input type="number" id="doctorId" class="form-control mb-2" placeholder="Doctor ID">
  <input type="text" id="patientName" class="form-control mb-2" placeholder="Patient Name">
  <input type="text" id="phone" class="form-control mb-2" placeholder="Phone Number">
  <input type="date" id="date" class="form-control mb-3">

  <button onclick="bookAppointment()" class="btn btn-success">Book</button>

  <hr>

  <h4>My Appointments</h4>
  <div id="appointments"></div>

</div>

<script>
const token = localStorage.getItem("token");
if (!token) window.location.href = "login.html";

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

async function bookAppointment() {

  const doctor_id = document.getElementById("doctorId").value;
  const patient_name = document.getElementById("patientName").value;
  const phone = document.getElementById("phone").value;
  const appointment_date = document.getElementById("date").value;

  if (!doctor_id || !patient_name || !phone || !appointment_date) {
    alert("All fields required");
    return;
  }

  const res = await fetch("http://localhost:3000/appointments", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({
      doctor_id,
      patient_name,
      phone,
      appointment_date
    })
  });

  const data = await res.json();
  alert("Token Number: " + data.token);
  loadAppointments();
}

async function loadAppointments() {
  const res = await fetch("http://localhost:3000/appointments", {
    headers: { Authorization: "Bearer " + token }
  });

  const data = await res.json();
  const container = document.getElementById("appointments");
  container.innerHTML = "";

  data.forEach(app => {
    container.innerHTML += `
      <div class="card mb-2 p-3">
        Doctor: ${app.doctor_name}<br>
        Date: ${app.appointment_date}<br>
        Token: ${app.token_number}<br>
        Status: ${app.status}<br><br>
        ${app.status === 'Booked' ?
          `<button onclick="cancelAppointment(${app.id})" class="btn btn-danger btn-sm">Cancel</button>`
          : ''
        }
      </div>
    `;
  });
}

async function cancelAppointment(id) {
  await fetch("http://localhost:3000/appointments/cancel/" + id, {
    method: "PUT",
    headers: { Authorization: "Bearer " + token }
  });
  loadAppointments();
}

loadAppointments();
</script>

</body>
</html>
