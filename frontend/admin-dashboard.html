<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary px-4">
  <span class="navbar-brand">Smart Clinic Admin</span>
  <button onclick="logout()" class="btn btn-light btn-sm">Logout</button>
</nav>

<div class="container mt-4">

  <div class="row mb-4">
    <div class="col-md-3">
      <div class="card p-3 text-center">
        <h6>Total Doctors</h6>
        <h3 id="totalDoctors">0</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 text-center">
        <h6>Total Appointments</h6>
        <h3 id="totalAppointments">0</h3>
      </div>
    </div>

    <div class="col-md-2">
      <div class="card p-3 text-center">
        <h6>Completed</h6>
        <h3 id="completed">0</h3>
      </div>
    </div>

    <div class="col-md-2">
      <div class="card p-3 text-center">
        <h6>Cancelled</h6>
        <h3 id="cancelled">0</h3>
      </div>
    </div>

    <div class="col-md-2">
      <div class="card p-3 text-center">
        <h6>Booked</h6>
        <h3 id="booked">0</h3>
      </div>
    </div>
  </div>

  <div class="card p-4">
    <h5>Appointments</h5>
    <table class="table table-bordered">
      <thead>
        <tr>
          <th>User</th>
          <th>Patient</th>
          <th>Phone</th>
          <th>Doctor</th>
          <th>Date</th>
          <th>Token</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="appointmentTable"></tbody>
    </table>
  </div>

</div>

<script>
const token = localStorage.getItem("token");
if (!token) window.location.href = "login.html";

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

async function loadStats() {
  const res = await fetch("http://localhost:3000/admin/stats", {
    headers: { "Authorization": "Bearer " + token }
  });
  const data = await res.json();
  totalDoctors.innerText = data.totalDoctors;
  totalAppointments.innerText = data.totalAppointments;
  completed.innerText = data.completed;
  cancelled.innerText = data.cancelled;
  booked.innerText = data.booked;
}

async function loadAppointments() {
  const res = await fetch("http://localhost:3000/admin/appointments", {
    headers: { "Authorization": "Bearer " + token }
  });
  const data = await res.json();
  appointmentTable.innerHTML = "";

  data.forEach(a => {
    appointmentTable.innerHTML += `
      <tr>
        <td>${a.user_name}</td>
        <td>${a.patient_name}</td>
        <td>${a.phone}</td>
        <td>${a.doctor_name}</td>
        <td>${a.appointment_date}</td>
        <td>${a.token_number}</td>
        <td>${a.status}</td>
        <td>
          <button onclick="updateStatus(${a.id}, 'Completed')" class="btn btn-success btn-sm">Complete</button>
          <button onclick="updateStatus(${a.id}, 'Cancelled')" class="btn btn-danger btn-sm">Cancel</button>
        </td>
      </tr>`;
  });
}

async function updateStatus(id, status) {
  await fetch("http://localhost:3000/admin/appointments/" + id, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ status })
  });
  loadAppointments();
  loadStats();
}

loadStats();
loadAppointments();
</script>

</body>
</html>
