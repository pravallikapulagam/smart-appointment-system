<!DOCTYPE html>
<html>
<head>
  <title>Smart Clinic Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width:400px;">
  <h3 class="text-center mb-3">Smart Clinic</h3>

  <input id="email" class="form-control mb-3" placeholder="Email">
  <input id="password" type="password" class="form-control mb-3" placeholder="Password">

  <button onclick="login()" class="btn btn-primary w-100">Login</button>
  <p id="msg" class="text-danger text-center mt-2"></p>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:3000/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    if (data.role === "admin")
      window.location.href = "admin-dashboard.html";
    else
      window.location.href = "location.html";
  } else {
    document.getElementById("msg").innerText = data.message;
  }
}
</script>

</body>
</html>
