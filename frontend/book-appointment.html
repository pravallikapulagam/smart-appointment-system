<!DOCTYPE html>
<html>
<head>
  <title>Book Appointment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary px-4">
  <div>
    <button onclick="goBack()" class="btn btn-light btn-sm me-2">← Back</button>
    <span class="navbar-brand">Book Appointment</span>
  </div>

  <button onclick="logout()" class="btn btn-light btn-sm">Logout</button>
</nav>


<div class="container mt-4">

  <h3 id="hospitalName"></h3>

  <h4 class="mt-4">Available Doctors</h4>
  <div id="doctors" class="mb-4"></div>

  <hr>

  <h4>Patient Details</h4>

  <input id="patientName" class="form-control mb-2" placeholder="Patient Name">

  <input id="age" type="number" class="form-control mb-2" placeholder="Age">

  <input id="phone" class="form-control mb-2" placeholder="Phone Number">


  <label>Select Appointment Date</label>
  <input id="date" type="date" class="form-control mb-2">


  <label>Select Time Slot</label>
  <select id="time" class="form-control mb-3">

    <option value="">Select Time Slot</option>

    <option value="09:00 AM">09:00 AM</option>
    <option value="10:00 AM">10:00 AM</option>
    <option value="11:00 AM">11:00 AM</option>
    <option value="12:00 PM">12:00 PM</option>
    <option value="02:00 PM">02:00 PM</option>
    <option value="03:00 PM">03:00 PM</option>
    <option value="04:00 PM">04:00 PM</option>

  </select>

  <button onclick="bookAppointment()" class="btn btn-success">
    Confirm Appointment
  </button>

  <hr>

  <h4>My Appointments</h4>

  <div id="appointments"></div>

</div>


<script>

const token = localStorage.getItem("token");
const hospitalId = localStorage.getItem("hospitalId");
const hospitalName = localStorage.getItem("hospitalName");

let selectedDoctor = null;

document.getElementById("hospitalName").innerText = hospitalName;

if (!token) window.location.href = "login.html";


/* ================= AUTO DATE ================= */

const today = new Date().toISOString().split("T")[0];
document.getElementById("date").min = today;
document.getElementById("date").value = today;


/* ================= LOGOUT ================= */

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}


/* ================= BACK ================= */

function goBack() {
  window.history.back();
}


/* ================= LOAD DOCTORS ================= */

async function loadDoctors() {

  const res = await fetch(
    "http://localhost:3000/hospital-doctors/" + hospitalId
  );

  const data = await res.json();

  const container = document.getElementById("doctors");
  container.innerHTML = "";

  data.forEach(d => {

    container.innerHTML += `
      <div class="card p-3 mb-2">

        <b>${d.name}</b><br>
        ${d.specialization} • ${d.experience}

        <button class="btn btn-primary btn-sm mt-2"
          onclick="selectDoctor(${d.id}, '${d.name}')">

          Select Doctor

        </button>

      </div>
    `;

  });

}


/* ================= SELECT DOCTOR ================= */

function selectDoctor(id, name) {

  selectedDoctor = id;

  alert("Selected Doctor: " + name);

}


/* ================= BOOK APPOINTMENT ================= */

async function bookAppointment() {

  const patient_name = document.getElementById("patientName").value;
  const age = document.getElementById("age").value;
  const phone = document.getElementById("phone").value;
  const appointment_date = document.getElementById("date").value;
  const appointment_time = document.getElementById("time").value;

  if (!selectedDoctor) {
    alert("Please select a doctor");
    return;
  }

  if (!patient_name || !age || !phone || !appointment_date || !appointment_time) {
    alert("Please fill all fields");
    return;
  }

  const res = await fetch("https://smart-appointment-system-e1wt.onrender.com", {

    method: "POST",

    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },

    body: JSON.stringify({
      doctor_id: selectedDoctor,
      patient_name,
      age,
      phone,
      appointment_date,
      appointment_time
    })

  });

  const data = await res.json();

  alert("Appointment booked. Token Number: " + data.token);

  loadAppointments();

}


/* ================= LOAD APPOINTMENTS ================= */

async function loadAppointments() {

  const res = await fetch(
    "http://localhost:3000/appointments",
    {
      headers: { Authorization: "Bearer " + token }
    }
  );

  const data = await res.json();

  const container = document.getElementById("appointments");
  container.innerHTML = "";

  const filtered = data.filter(a => a.hospital_id == hospitalId);

  filtered.forEach(app => {

    container.innerHTML += `
      <div class="card mb-2 p-3">

        <b>Hospital:</b> ${app.hospital_name}<br>
        <b>Doctor:</b> ${app.doctor_name}<br>
        <b>Date:</b> ${app.appointment_date}<br>
        <b>Time:</b> ${app.appointment_time}<br>
        <b>Token:</b> ${app.token_number}<br><br>

        <b>Status:</b> ${app.status}<br><br>

        ${app.status === "Booked"
          ? `<button onclick="cancelAppointment(${app.id})"
              class="btn btn-danger btn-sm">
              Cancel Appointment
            </button>`
          : ""}

      </div>
    `;

  });

}


/* ================= CANCEL ================= */

async function cancelAppointment(id) {

  await fetch(
    "http://localhost:3000/appointments/cancel/" + id,
    {
      method: "PUT",
      headers: { Authorization: "Bearer " + token }
    }
  );

  loadAppointments();

}


/* ================= INITIAL LOAD ================= */

loadDoctors();
loadAppointments();

</script>

</body>
</html>
